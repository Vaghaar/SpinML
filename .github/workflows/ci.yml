name: CI — SpinMyLunch

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  REGISTRY:      ghcr.io
  IMAGE_PREFIX:  ${{ github.repository_owner }}/spinmylunch

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 : Backend Java (Spring Boot)
  # ────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       spinmylunch_test
          POSTGRES_USER:     test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build & run tests
        run: mvn verify -B --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE:    test
          SPRING_DATASOURCE_URL:     jdbc:postgresql://localhost:5432/spinmylunch_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_DATA_REDIS_HOST:    localhost
          SPRING_DATA_REDIS_PORT:    6379
          SPRING_DATA_REDIS_PASSWORD: ""
          JWT_SECRET:                test_secret_at_least_256_bits_long_for_hs256_algorithm_ci
          GOOGLE_CLIENT_ID:          test_client_id
          GOOGLE_CLIENT_SECRET:      test_client_secret
          FRONTEND_URL:              http://localhost:3000

      - name: Upload JAR (pour Docker build)
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/spinmylunch-backend-*.jar
          retention-days: 1

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 : Frontend Next.js
  # ────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint, Type-check, Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Run tests
        run: npm test

      - name: Build production
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED:      1
          NEXT_PUBLIC_API_URL:          ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:8080' }}
          NEXT_PUBLIC_WS_URL:           ${{ vars.NEXT_PUBLIC_WS_URL  || 'ws://localhost:8080' }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID    || 'test_client_id' }}

      - name: Upload standalone build (pour Docker build)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-standalone
          path: |
            frontend/.next/standalone
            frontend/.next/static
            frontend/public
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 : Docker Images (uniquement sur main)
  # ────────────────────────────────────────────────────────────────────────────
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # ── Télécharger les artifacts pré-compilés ────────────────────────────
      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/

      - name: Download frontend standalone
        uses: actions/download-artifact@v4
        with:
          name: frontend-standalone
          path: frontend/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend ──────────────────────────────────────────────────────────
      - name: Extract metadata — backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context:    ./backend
          dockerfile: ./backend/Dockerfile
          push:       true
          tags:       ${{ steps.meta-backend.outputs.tags }}
          labels:     ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Extract metadata — frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context:    ./frontend
          dockerfile: ./frontend/Dockerfile
          push:       true
          tags:       ${{ steps.meta-frontend.outputs.tags }}
          labels:     ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
