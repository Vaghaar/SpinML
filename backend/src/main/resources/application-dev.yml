# Profil développement — surcharges de application.yml
spring:
  jpa:
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      password: redis_secret

logging:
  level:
    com.spinmylunch: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

management:
  endpoint:
    health:
      show-details: always
