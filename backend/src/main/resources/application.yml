spring:
  application:
    name: spinmylunch-backend

  # ─── DataSource PostgreSQL ─────────────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/spinmylunch}
    username: ${SPRING_DATASOURCE_USERNAME:spinmylunch}
    password: ${SPRING_DATASOURCE_PASSWORD:spinmylunch_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ─── JPA / Hibernate ──────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        format_sql: false
        jdbc:
          time_zone: UTC
    open-in-view: false

  # ─── Flyway ───────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ─── Redis ────────────────────────────────────────────────────────────────
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 2000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  # ─── Cache ────────────────────────────────────────────────────────────────
  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10 minutes

  # ─── Security OAuth2 ─────────────────────────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, profile, email
            redirect-uri: "${FRONTEND_URL:http://localhost:3000}/auth/callback"

# ─── Application custom ────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:AhMd9t1X1r7Wgu4lyUdepPQX92+yHUyAWrM9muwLHTg=}
    access-token-expiration: 900         # 15 minutes en secondes
    refresh-token-expiration: 604800     # 7 jours en secondes
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  cors:
    allowed-origins:
      - ${FRONTEND_URL:http://localhost:3000}
  rate-limit:
    requests-per-minute: 100
    spins-per-minute: 10
    vote-sessions-per-hour: 5
  anonymization:
    inactive-months: 12

# ─── Actuator / Monitoring ──────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
  health:
    redis:
      enabled: true
    db:
      enabled: true

# ─── Logging ────────────────────────────────────────────────────────────────
logging:
  level:
    com.spinmylunch: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# ─── Server ────────────────────────────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json
  error:
    include-message: never
    include-binding-errors: never
