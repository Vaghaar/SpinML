# Profil production — surcharges de application.yml
spring:
  jpa:
    properties:
      hibernate:
        format_sql: false
  data:
    redis:
      # Le mot de passe est obligatoire en prod (pas de valeur par défaut)
      password: ${SPRING_DATA_REDIS_PASSWORD}

logging:
  level:
    com.spinmylunch:              WARN
    org.springframework.security: WARN
    org.hibernate.SQL:            WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoint:
    health:
      show-details: when-authorized
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
